name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true
workers_dev = false

[observability]
enabled = true

[[routes]]
pattern = "mail.itycon.cn"
custom_domain = true

[[d1_databases]]
binding = "db"			#d1数据库绑定名默认不可修改
database_name = "mail"		#d1数据库名字
database_id = "265e20f6-fb04-4d16-a9c8-30b082b7ade1"		#d1数据库id

[[kv_namespaces]]
binding = "kv"			#kv绑定名默认不可修改
id = "93adc15e30c24091a62122876045477d"					#kv数据库id

[[r2_buckets]]
binding = "r2"			#r2对象存储绑定名默认不可修改
bucket_name = "cloud-mail"		#r2对象存储桶的名字

#[[send_email]]
#name = "email"			#CF发件, 配置后优先使用

[ai]
binding = "ai"

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#每天晚上12点执行每日任务,刷新分析缓存


[vars]
#ai_model = ""			#ai模型,不填默认使用@cf/meta/llama-3.1-8b-instruct
#analysis_cache = false			#是否开启分析数据缓存
#orm_log = false			#是否sql日志
domain = ["itycon.cn", "astro.cn"]				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
admin = "admin@itycon.cn"				#管理员的邮箱	示例: admin@example.com
#jwt_secret = ""			#jwt令牌的密钥,请使用 wrangler secret put jwt_secret 设置

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
